services:
  postgres:
    image: postgres:15-alpine
    container_name: cc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: callcenter
      POSTGRES_USER: ccadmin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-strongpassword123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - cc_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ccadmin -d callcenter"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cc_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass123}
    volumes:
      - redis_data:/data
    networks:
      - cc_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  asterisk:
    build:
      context: ./asterisk
      dockerfile: Dockerfile
    container_name: cc_asterisk
    restart: unless-stopped
    networks:
      - cc_network
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "5038:5038"
      - "10000-10100:10000-10100/udp"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: callcenter
      DB_USER: ccadmin
      DB_PASSWORD: ${DB_PASSWORD:-strongpassword123}
    volumes:
      - recordings:/var/spool/asterisk/monitor
      - ./asterisk/agents_dynamic.conf:/etc/asterisk/agents_dynamic.conf
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cc_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: callcenter
      DB_USER: ccadmin
      DB_PASSWORD: ${DB_PASSWORD:-strongpassword123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass123}
      JWT_SECRET: ${JWT_SECRET:-changeme_use_long_random_string}
      ASTERISK_HOST: cc_asterisk
      ASTERISK_AMI_PORT: 5038
      ASTERISK_AMI_USER: ccadmin
      ASTERISK_AMI_SECRET: ${ASTERISK_AMI_SECRET:-amipassword}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cc_network
    volumes:
      - recordings:/app/recordings

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cc_frontend
    restart: unless-stopped
    networks:
      - cc_network

  nginx:
    image: nginx:alpine
    container_name: cc_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - cc_network

volumes:
  postgres_data:
  redis_data:
  recordings:

networks:
  cc_network:
    driver: bridge
