; ============================================================
; CallCenter SaaS - Asterisk Dialplan
; Hybrid GSM + VoIP model
; ============================================================

[globals]
; Backend API for AGI scripts
BACKEND_URL=http://backend:3000
; Default hold music
MOH=default
; Max queue wait time (seconds)
MAX_QUEUE_WAIT=120
; GSM fallback timeout (seconds)
GSM_TIMEOUT=20

; ============================================================
; [from-gsm] — Incoming calls from GSM Gateway (GoIP)
; ============================================================
[from-gsm]
exten => _X.,1,NoOp(=== GSM CALL: ${CALLERID(num)} -> ${EXTEN} ===)
 ; Set call variables
 same => n,Set(CALL_TYPE=gsm)
 same => n,Set(CALLED_NUM=${EXTEN})
 same => n,Set(CALL_START=${EPOCH})

 ; Find tenant by called number via AGI
 same => n,AGI(find_tenant.php,${EXTEN})

 ; Check if tenant found
 same => n,GotoIf($["${TENANT_ID}" = ""]?no_tenant,1)

 ; Check working hours
 same => n,AGI(check_hours.php,${TENANT_ID})
 same => n,GotoIf($["${IN_HOURS}" = "0"]?closed,1)

 ; Route to tenant queue
 same => n,Goto(tenant-queue,${QUEUE_NAME},1)

exten => no_tenant,1,NoOp(No tenant found for ${CALLED_NUM})
 same => n,Playback(invalid)
 same => n,Hangup()

exten => closed,1,NoOp(Outside working hours for ${TENANT_ID})
 same => n,Playback(custom/closed)
 same => n,Hangup()

; ============================================================
; [from-voip] — Incoming calls from Twilio/Zadarma VoIP
; ============================================================
[from-voip]
exten => _X.,1,NoOp(=== VOIP CALL: ${CALLERID(num)} -> ${EXTEN} ===)
 same => n,Set(CALL_TYPE=voip)
 same => n,Set(CALLED_NUM=${EXTEN})

 ; Find tenant
 same => n,AGI(find_tenant.php,${EXTEN})
 same => n,GotoIf($["${TENANT_ID}" = ""]?invalid,1)

 ; Check working hours
 same => n,AGI(check_hours.php,${TENANT_ID})
 same => n,GotoIf($["${IN_HOURS}" = "0"]?voip-closed,1)

 same => n,Goto(tenant-queue,${QUEUE_NAME},1)

exten => invalid,1,Playback(invalid)
 same => n,Hangup()

exten => voip-closed,1,Playback(custom/closed)
 same => n,Voicemail(${TENANT_ID}@default,u)
 same => n,Hangup()

; ============================================================
; [tenant-queue] — Main queue handler
; ============================================================
[tenant-queue]
exten => _X.,1,NoOp(=== QUEUE: ${EXTEN} ===)
 same => n,Answer()
 same => n,Set(CHANNEL(musicclass)=default)

 ; Welcome message
 same => n,Playback(custom/welcome)

 ; Wait in queue with timeout
 same => n,Set(QUEUE_RESULT=${QUEUE(${EXTEN},t,,,${MAX_QUEUE_WAIT})})

 ; Check queue result
 same => n,GotoIf($["${QUEUE_RESULT}" = "FULL"]?queue-full,1)
 same => n,GotoIf($["${QUEUE_RESULT}" = "TIMEOUT"]?queue-timeout,1)
 same => n,GotoIf($["${QUEUE_RESULT}" = "JOINEMPTY"]?no-agents,1)

 ; Call was answered — log via AGI
 same => n,AGI(log_call.php,answered,${CALL_TYPE})
 same => n,Hangup()

exten => queue-full,1,NoOp(Queue full — trying VoIP fallback)
 ; Hybrid fallback: if GSM, try VoIP number
 same => n,GotoIf($["${CALL_TYPE}" = "gsm"]?gsm-fallback,1)
 same => n,Voicemail(${TENANT_ID}@default,u)
 same => n,Hangup()

exten => gsm-fallback,1,NoOp(GSM Fallback to VoIP)
 same => n,AGI(get_voip_fallback.php,${TENANT_ID})
 same => n,GotoIf($["${FALLBACK_NUM}" = ""]?no-fallback,1)
 same => n,Dial(SIP/${FALLBACK_NUM},${GSM_TIMEOUT},tTr)
 same => n,Hangup()

exten => no-fallback,1,Playback(custom/busy)
 same => n,AGI(log_call.php,missed,${CALL_TYPE})
 same => n,Hangup()

exten => queue-timeout,1,NoOp(Queue timeout — caller waited too long)
 same => n,Playback(custom/timeout)
 same => n,AGI(log_call.php,abandoned,${CALL_TYPE})
 same => n,Hangup()

exten => no-agents,1,NoOp(No agents available)
 same => n,Playback(custom/no-agents)
 same => n,AGI(log_call.php,missed,${CALL_TYPE})
 same => n,Hangup()

; ============================================================
; [agents] — SIP agent extensions (1001-1999)
; ============================================================
[agents]
exten => _1XXX,1,NoOp(Internal call to agent ${EXTEN})
 same => n,Dial(SIP/${EXTEN},30)
 same => n,Hangup()

; ============================================================
; [default] — Catch-all
; ============================================================
[default]
exten => s,1,Hangup()
exten => i,1,Hangup()
exten => t,1,Hangup()
