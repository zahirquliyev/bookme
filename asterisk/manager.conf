; ============================================================
; manager.conf — Asterisk Manager Interface (AMI)
; ============================================================

[general]
enabled=yes
port=5038
bindaddr=0.0.0.0
timestampevents=yes
displayconnects=yes

; ── Backend API user ─────────────────────────────────────
[ccadmin]
secret=amipassword          ; Override via env in docker-compose
deny=0.0.0.0/0.0.0.0
permit=127.0.0.1/255.255.255.0
permit=172.16.0.0/255.240.0.0   ; Docker network range
read=all
write=all
writetimeout=5000
