; ============================================================
; queues.conf — Queue configuration
; Each tenant gets its own queue, managed dynamically
; ============================================================

[general]
persistentmembers=yes
autofill=yes
monitor-type=MixMonitor    ; For call recording
shared_lastcall=no
log_membername_as_agent=no

; ── Default queue template ───────────────────────────────
[queue-template](!)
strategy=ringall           ; Ring all available agents
timeout=20                 ; Ring each agent 20 seconds
retry=5                    ; Retry every 5 seconds
wrapuptime=5               ; 5 second cooldown after call
maxlen=10                  ; Max 10 callers waiting
announce-frequency=30      ; Announce position every 30 sec
announce-holdtime=once
joinempty=strict           ; Don't join if no agents available
leavewhenempty=yes         ; Leave queue if agents go offline
reportholdtime=yes
musicclass=default
ringinuse=no               ; Don't ring agents already on a call
weight=0

; ── Tenants create queues dynamically via DB ─────────────
; Queues are registered via Asterisk realtime (ARA)
; with PostgreSQL backend, so this file is just a template.
;
; Each tenant's queue name format: q_<slug>
; Example: q_restaurant_firuze
;          q_pub_sahil
;
; Dynamic queue creation via AMI action:
;   Action: QueueAdd / QueueRemove
