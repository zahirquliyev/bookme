; ============================================================
; sip.conf — SIP configuration for CallCenter SaaS
; ============================================================

[general]
externip=192.168.25.3
localnet=172.18.0.0/16
localnet=192.168.25.0/24
context=default
allowoverlap=no
udpbindaddr=0.0.0.0
tcpenable=yes
tcpbindaddr=0.0.0.0
transport=udp,tcp
srvlookup=yes
allowguest=no
alwaysauthreject=yes       ; Security: don't reveal if user exists
maxexpirey=3600
minexpirey=60
defaultexpiry=120
qualify=yes
nat=force_rport,comedia
videosupport=no
textsupport=no

; Codecs
allow=!all
allow=ulaw
allow=alaw
allow=g729

; RTP ports
rtpstart=10000
rtpend=20000

; ── Twilio VoIP Trunk ───────────────────────────────────
[twilio-trunk](!)
type=peer
host=dynamic
defaultuser=twilio
fromuser=twilio
context=from-voip
insecure=port,invite
dtmfmode=rfc2833
canreinvite=no
disallow=all
allow=ulaw
nat=force_rport,comedia

[twilio-us](!,twilio-trunk)
host=sip.twilio.com
username=${TWILIO_SIP_USER}

; ── Zadarma VoIP Trunk ──────────────────────────────────
[zadarma-trunk](!)
type=peer
host=sip.zadarma.com
defaultuser=${ZADARMA_USER}
secret=${ZADARMA_SECRET}
context=from-voip
insecure=port,invite
dtmfmode=rfc2833
canreinvite=no
disallow=all
allow=ulaw
allow=alaw

; ── GoIP GSM Gateway ────────────────────────────────────
; Each port on GoIP device = one SIM card
[goip-template](!)
type=peer
host=dynamic
context=from-gsm
insecure=port,invite
dtmfmode=rfc2833
canreinvite=no
disallow=all
allow=ulaw
allow=alaw
nat=force_rport,comedia
qualify=yes

[goip-port1](goip-template)
; SIM 1 - Primary number (e.g., 050-XXX-XX-XX)
username=goip1
secret=${GOIP_SECRET}
callerid="GSM Line 1" <goip1>

[goip-port2](goip-template)
; SIM 2 - Fallback number
username=goip2
secret=${GOIP_SECRET}
callerid="GSM Line 2" <goip2>

[goip-port3](goip-template)
; SIM 3 - Third line (optional)
username=goip3
secret=${GOIP_SECRET}
callerid="GSM Line 3" <goip3>

; ── Agent SIP accounts are auto-generated ───────────────
; Template for agents — actual credentials in realtime DB
[agent-template](!)
type=friend
host=dynamic
context=agents
dtmfmode=rfc2833
canreinvite=no
disallow=all
allow=ulaw
allow=alaw
allow=g729
nat=force_rport,comedia
qualify=yes
call-limit=2

#include agents_dynamic.conf
